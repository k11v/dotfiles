[font]
glyph_offset.y = 5
normal.family = "JetBrainsMono Nerd Font Mono"
offset.y = 10
size = 13.0

[terminal]
shell.program = "/bin/sh"
shell.args = [
	"-c",
	"""
	set -e
	alias tmux="/opt/homebrew/bin/tmux" # for tmux installed with Homebrew on Apple Silicon
	tmux start-server
	tmux has-session || tmux new-session -d -s default
	tmux attach-session
	""",
]

[window]
decorations = "None"
padding.x = 8
padding.y = 8
