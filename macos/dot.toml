- default: ["com.apple.bird", "optimize-storage", false]                                                 # keep iCloud files downloaded # Apple ID
- default: ["com.apple.dock", "autohide", true]                                                          # automatically hide and show the Dock # Dock & Menu Bar
- default: ["com.apple.dock", "autohide-delay", 0.2]                                                     # speed up the Dock's auto-hiding
- default: ["com.apple.dock", "autohide-time-modifier", 0.7]                                             # speed up the Dock's hiding/showing animation
- default: ["com.apple.dock", "minimize-to-application", true]                                           # minimize windows into application icon in Dock
- default: ["com.apple.dock", "persistent-apps", []]                                                     # remove all (default) icons from Dock
- default: ["com.apple.dock", "show-process-indicators", true]                                           # show indicators for open applications in Dock
- default: ["com.apple.dock", "show-recents", false]                                                     # don't show recent applications in Dock
- default: ["com.apple.dock", "mru-spaces", false]                                                       # don't automatically rearrange Spaces # Mission Control
- default: ["com.apple.dock", "wvous-br-corner", 1]                                                      # turn off quick note feature
- default: ["NSGlobalDomain", "AppleICUForce12HourTime", true]                                           # 12-hour time # Language & Region
- default: ["NSGlobalDomain", "AppleICUNumberSymbols", { "0" = ".", "1" = ",", "10" = ".", "17" = "," }] # US number separators
- default: ["NSGlobalDomain", "AppleLanguages", ["en-US", "ru-RU"]]                                      # preferred languages: English (US), Russian
- default: ["NSGlobalDomain", "AppleLocale", "en_US"]                                                    # region: US
- default: ["NSGlobalDomain", "AppleMeasurementUnits", "Centimeters"]                                    # metric measurement units
- default: ["NSGlobalDomain", "AppleMetricUnits", true]                                                  # metric measurement units
- default: ["NSGlobalDomain", "AppleTemperatureUnit", "Celsius"]                                         # temperature: Celsius
- default: ["NSGlobalDomain", "ApplePressAndHoldEnabled", false]                                         # disable press-and-hold for keys in favor of key repeat # Keyboard
- default: ["NSGlobalDomain", "InitialKeyRepeat", 15]                                                    # make delay until key repeat shorter
- default: ["NSGlobalDomain", "KeyRepeat", 2]                                                            # make key repeat faster
- default: ["NSGlobalDomain", "NSAutomaticCapitalizationEnabled", false]                                 # disable automatic capitalization
- default: ["NSGlobalDomain", "NSAutomaticDashSubstitutionEnabled", false]                               # disable smart dashes
- default: ["NSGlobalDomain", "NSAutomaticPeriodSubstitutionEnabled", false]                             # disable automatic period substitution
- default: ["NSGlobalDomain", "NSAutomaticQuoteSubstitutionEnabled", false]                              # disable smart quotes
- default: ["NSGlobalDomain", "NSAutomaticSpellingCorrectionEnabled", false]                             # disable auto-correct
- default: ["com.apple.HIToolbox", "AppleDictationAutoEnable", false]                                    # disable "Enable dictation" prompt when Fn key is pressed multiple times
- default: ["NSGlobalDomain", "com.apple.trackpad.scaling", 1]                                           # make tracking speed faster # Trackpad
- default: ["com.apple.AppleMultitouchTrackpad", "ActuationStrength", 0]                                 # enable silent clicking
- default: ["com.apple.AppleMultitouchTrackpad", "FirstClickThreshold", 0]                               # make trackpad click feel light (also set SecondClickThreshold)
- default: ["com.apple.AppleMultitouchTrackpad", "SecondClickThreshold", 0]                              # make trackpad click feel light (also set FirstClickThreshold)
- default: ["NSGlobalDomain", "AppleShowAllExtensions", true]                                            # show all filename extensions (in open/save dialogs too) # Other
- default: ["NSGlobalDomain", "AppleShowAllFiles", true]                                                 # show hidden files (in open/save dialogs too)

- run: ['/usr/libexec/PlistBuddy -c "Delete :AppleSymbolicHotKeys:60" -c "Add :AppleSymbolicHotKeys:60:enabled bool true" -c "Add :AppleSymbolicHotKeys:60:value dict" -c "Add :AppleSymbolicHotKeys:60:value:parameters array" -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 65535" -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 80" -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 8388608" -c "Add :AppleSymbolicHotKeys:60:value:type string standard" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"'] # map "Select the previous input source" shortcut to F19 (which is managed by Karabiner) # Keyboard
- run: ['/usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:61:enabled bool false" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"']                                                                                                                                                                                                                                                                                                                                                                                                             # disable "Select the next source in Input menu" shortcut
- run: ['/usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:64:enabled bool false" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"']                                                                                                                                                                                                                                                                                                                                                                                                             # disable "Show Spotlight search" shortcut (in favor of Alfred)
- run: ['/usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:65:enabled bool false" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"']                                                                                                                                                                                                                                                                                                                                                                                                             # disable "Show Finder search window" shortcut

- run: ["sudo scutil --set ComputerName \"Kirill's MacBook\""] # set computer name # Sharing
- run: ['sudo scutil --set LocalHostName "kirills-macbook"']   # set local hostname
