Run = [
  ['/usr/libexec/PlistBuddy -c "Delete :AppleSymbolicHotKeys:60" -c "Add :AppleSymbolicHotKeys:60:enabled bool true" -c "Add :AppleSymbolicHotKeys:60:value dict" -c "Add :AppleSymbolicHotKeys:60:value:parameters array" -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 65535" -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 80" -c "Add :AppleSymbolicHotKeys:60:value:parameters: integer 8388608" -c "Add :AppleSymbolicHotKeys:60:value:type string standard" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"'], # map "Select the previous input source" shortcut to F19 (which is managed by Karabiner) # Keyboard
  ['/usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:61:enabled bool false" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"'],                                                                                                                                                                                                                                                                                                                                                                                                             # disable "Select the next source in Input menu" shortcut
  ['/usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:64:enabled bool false" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"'],                                                                                                                                                                                                                                                                                                                                                                                                             # disable "Show Spotlight search" shortcut (in favor of Alfred)
  ['/usr/libexec/PlistBuddy -c "Set :AppleSymbolicHotKeys:65:enabled bool false" "$HOME/Library/Preferences/com.apple.symbolichotkeys.plist"'],                                                                                                                                                                                                                                                                                                                                                                                                             # disable "Show Finder search window" shortcut
]

